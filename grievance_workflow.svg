<svg width="680" height="796" viewBox="0 0 680 796" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img">
  <title>AI-Driven Citizen Grievance Sentiment Analysis System — Workflow</title>
  <desc>End-to-end workflow: citizen input → NLP preprocessing → sentiment analysis → classification → routing → resolution</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="796" fill="#ffffff" rx="0"/>

  <!-- Title -->
  <text x="340" y="18" text-anchor="middle" font-size="11" fill="#888" font-weight="400">AI-Driven Citizen Grievance Sentiment Analysis — System Workflow</text>

  <!-- STEP 1: Citizen Input -->
  <rect x="215" y="30" width="250" height="56" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="340" y="52" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" dominant-baseline="central">Citizen submits grievance</text>
  <text x="340" y="71" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">Web / mobile / portal / SMS</text>

  <line x1="340" y1="86" x2="340" y2="116" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 2: Data Ingestion -->
  <rect x="215" y="116" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="138" text-anchor="middle" font-size="14" font-weight="500" fill="#444441" dominant-baseline="central">Data ingestion layer</text>

  <line x1="340" y1="160" x2="340" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 3: NLP Preprocessing -->
  <rect x="190" y="190" width="300" height="68" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="340" y="213" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">NLP preprocessing</text>
  <text x="340" y="231" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Tokenization · stopword removal</text>
  <text x="340" y="248" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Lemmatization · noise filtering</text>

  <line x1="340" y1="258" x2="340" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 4: Sentiment Analysis -->
  <rect x="190" y="288" width="300" height="68" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="340" y="311" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">Sentiment analysis engine</text>
  <text x="340" y="329" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">Positive · Negative · Neutral</text>
  <text x="340" y="346" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">ML model (BERT / VADER / custom)</text>

  <line x1="340" y1="356" x2="340" y2="386" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 5: Urgency Scoring -->
  <rect x="215" y="386" width="250" height="56" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="340" y="408" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C" dominant-baseline="central">Urgency &amp; priority scoring</text>
  <text x="340" y="427" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">High · Medium · Low</text>

  <line x1="340" y1="442" x2="340" y2="472" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 6: Grievance Classification -->
  <rect x="190" y="472" width="300" height="68" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="340" y="495" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">Grievance classification</text>
  <text x="340" y="513" text-anchor="middle" font-size="12" fill="#3C3489" dominant-baseline="central">Infrastructure · Health · Water</text>
  <text x="340" y="530" text-anchor="middle" font-size="12" fill="#3C3489" dominant-baseline="central">Sanitation · Roads · Education…</text>

  <line x1="340" y1="540" x2="340" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 7: Auto Department Routing -->
  <rect x="215" y="570" width="250" height="56" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="340" y="592" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Auto department routing</text>
  <text x="340" y="611" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Assigned to relevant authority</text>

  <line x1="340" y1="626" x2="340" y2="656" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 8: Analytics & Insights -->
  <rect x="190" y="656" width="300" height="68" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
  <text x="340" y="679" text-anchor="middle" font-size="14" font-weight="500" fill="#173404" dominant-baseline="central">Analytics &amp; insights report</text>
  <text x="340" y="697" text-anchor="middle" font-size="12" fill="#3B6D11" dominant-baseline="central">Trend analysis · Heatmaps</text>
  <text x="340" y="714" text-anchor="middle" font-size="12" fill="#3B6D11" dominant-baseline="central">Department performance metrics</text>

  <!-- Feedback loop (dashed) -->
  <path d="M190 690 L105 690 L105 322 L190 322" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow-dash)"/>
  <text transform="rotate(-90,90,506)" x="90" y="506" text-anchor="middle" font-size="10" fill="#aaa">Model feedback loop</text>

  <!-- STEP 9: Grievance Resolved -->
  <line x1="340" y1="724" x2="340" y2="754" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="754" width="200" height="44" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="340" y="780" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Grievance resolved ✓</text>

  <!-- Step number badges -->
  <circle cx="207" cy="58" r="11" fill="#378ADD"/>
  <text x="207" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">1</text>
  <circle cx="207" cy="138" r="11" fill="#888780"/>
  <text x="207" y="138" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">2</text>
  <circle cx="182" cy="224" r="11" fill="#1D9E75"/>
  <text x="182" y="224" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">3</text>
  <circle cx="182" cy="322" r="11" fill="#BA7517"/>
  <text x="182" y="322" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">4</text>
  <circle cx="207" cy="414" r="11" fill="#D85A30"/>
  <text x="207" y="414" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">5</text>
  <circle cx="182" cy="506" r="11" fill="#7F77DD"/>
  <text x="182" y="506" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">6</text>
  <circle cx="207" cy="598" r="11" fill="#1D9E75"/>
  <text x="207" y="598" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">7</text>
  <circle cx="182" cy="690" r="11" fill="#639922"/>
  <text x="182" y="690" text-anchor="middle" font-size="10" font-weight="500" fill="white" dominant-baseline="central">8</text>
</svg>
